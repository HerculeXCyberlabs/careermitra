# S030 — local Postgres for the crawler store.
#   docker compose up -d        # start (schema auto-applied on first run)
#   docker compose down         # stop (keeps data)
#   docker compose down -v      # stop + wipe data
# Then run the crawler with CM_STORE=pg (see README / .env.example).
services:
  postgres:
    image: postgres:16-alpine
    container_name: careermitra-crawler-db
    environment:
      POSTGRES_USER: cm
      POSTGRES_PASSWORD: cm_dev_pw
      POSTGRES_DB: careermitra
    ports:
      - '5439:5432' # host 5439 to avoid clashing with any local Postgres on 5432
    volumes:
      - cm_pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U cm -d careermitra']
      interval: 5s
      timeout: 3s
      retries: 10
volumes:
  cm_pgdata:
